server.port=${PORT:8080}

meta.whatsapp.token=${META_WHATSAPP_TOKEN}
meta.whatsapp.phone-number-id=${META_WHATSAPP_PHONE_NUMBER_ID}

resend.api.key=${RESEND_API_KEY}
resend.from.email=${RESEND_FROM_EMAIL}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.hikari.connection-init-sql=SET search_path TO public

anthropic.api.key=${ANTHROPIC_API_KEY}
supabase.jwt.secret=${SUPABASE_JWT_SECRET}
supabase.jwks.url=${SUPABASE_JWKS_URL}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}