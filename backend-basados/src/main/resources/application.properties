server.port=8080

meta.whatsapp.token=${META_WHATSAPP_TOKEN}
meta.whatsapp.phone-number-id=${META_WHATSAPP_PHONE_NUMBER_ID}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.hikari.connection-init-sql=SET search_path TO public

anthropic.api.key=${ANTHROPIC_API_KEY}
supabase.jwt.secret=${SUPABASE_JWT_SECRET}
supabase.jwks.url=${SUPABASE_JWKS_URL}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}